{% extends "layout.html" %}

{% block title %}
    Modify
{% endblock %}

{% block main %}
<div class="form-heading">
  <h1>Modify Flashcards</h1>
</div>
<form method="POST" action="/modify/{{ flashcard[0] }}">
  <div class="form-group">
    <label for="course">Course</label>
    <input type="text" class="form-control" id="course" name="course" autocomplete="off" value="{{ flashcard[4] }}" required>
  </div>
  <div class="form-group">
    <label for="lecture">Lecture</label>
    <input type="number" class="form-control" id="lecture" name="lecture" autocomplete="off" value="{{ flashcard[5] }}" required>
  </div>
  <div class="form-group">
    <label for="front">Front</label>
    <input type="text" class="form-control" id="front" name="front" autocomplete="off" value="{{ flashcard[2] }}" required>
  </div>
  <div class="form-group">
    <label for="back">Back</label>
    <input type="text" class="form-control" id="back" name="back" autocomplete="off" value="{{ flashcard[3] }}" required>
  </div>
  <button type="submit" class="btn btn-primary">Update Flashcard</button>
</form>
{% endblock %}
