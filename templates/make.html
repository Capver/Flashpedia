{% extends "layout.html" %}

{% block title %}
    Make
{% endblock %}

{% block main %}
<div class="form-heading">
  <h1>Make Flashcards</h1>
</div>
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <form id="flashcard-form" method="POST" action="/">
        <div class="form-group">
          <label for="course">Course</label>
          <input type="text" class="form-control" id="course" name="course" autocomplete="off" placeholder="Enter the course name" list="courselist" required>
          <datalist id="courselist">
            {% for course in courses %}
            <option value="{{ course }}">{{ course }}</option>
            {% endfor %}
          </datalist>
        </div>
        <div class="form-group">
          <label for="lecture">Lecture</label>
          <input type="number" class="form-control" id="lecture" name="lecture" autocomplete="off" placeholder="Enter the lecture number" list="lecturelist" required>
          <datalist id="lecturelist">
            {% for lecture in lectures %}
            <option value="{{ lecture }}">{{ lecture }}</option>
            {% endfor %}
          </datalist>
        </div>
        <div class="form-group">
          <label for="front">Front</label>
          <input type="text" class="form-control" id="front" name="front" autocomplete="off" placeholder="Enter the question or term" required>
        </div>
        <div class="form-group">
          <label for="back">Back</label>
          <input type="text" class="form-control" id="back" name="back" autocomplete="off" placeholder="Enter the answer or definition" required>
        </div>
        <button type="submit" class="btn btn-primary">Submit</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
